<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stars*</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:      #39ff6e;
      --green-glow: rgba(57,255,110,0.5);
      --red:        #ff4060;
      --white:      #f0f4ff;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #000;
      font-family: 'Nunito', sans-serif;
    }

    /* ── BG Video — B&W, no color tint ── */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.5;
      filter: grayscale(1);
    }

    /* ── Subtle dark center vignette only — no color ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.6)  100%
      );
      pointer-events: none;
    }

    /* ── Gate — dead center via fixed + transform ── */
    .gate {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 360px;
      max-width: 90vw;
      animation: fadeUp 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translate(-50%, calc(-50% + 16px)); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    /* ── ACCESS CODE label ── */
    .field-label {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 12px;
      align-self: flex-start;
    }

    /* ── Input wrap ── */
    .input-wrap {
      width: 100%;
      margin-bottom: 20px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .input-wrap:hover,
    .input-wrap:focus-within {
      transform: scale(1.04);
    }

    #password {
      width: 100%;
      padding: 15px 22px;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      color: var(--white);
      font-family: 'Nunito', sans-serif;
      font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      caret-color: rgba(255,255,255,0.7);
    }
    #password::placeholder {
      color: rgba(255,255,255,0.2);
      letter-spacing: 3px;
      font-size: 11px;
      font-weight: 700;
    }
    #password:focus {
      border-color: rgba(255,255,255,0.65);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      align-self: flex-start;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green), 0 0 22px rgba(57,255,110,0.45);
      flex-shrink: 0;
      animation: greenBlink 1.4s ease-in-out infinite;
    }
    @keyframes greenBlink {
      0%, 100% { opacity: 1;    box-shadow: 0 0 10px var(--green), 0 0 22px rgba(57,255,110,0.45); }
      50%       { opacity: 0.08; box-shadow: none; }
    }
    .status-text {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* ── Enter Button ── */
    #enter-btn {
      width: 100%;
      padding: 16px 24px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      background: transparent;
      color: var(--white);
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 7px;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      overflow: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      transition:
        transform     0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
        border-color  0.3s ease,
        background    0.3s ease,
        box-shadow    0.3s ease,
        color         0.3s ease;
    }
    #enter-btn::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: -120%; width: 60%;
      background: linear-gradient(90deg, transparent, rgba(57,255,110,0.12), transparent);
      transition: left 0.5s ease;
      pointer-events: none;
    }
    #enter-btn:hover {
      transform: scale(1.05);
      border-color: var(--green);
      background: rgba(57,255,110,0.1);
      color: var(--green);
      box-shadow:
        0 0 20px var(--green-glow),
        0 0 50px rgba(57,255,110,0.18),
        0 0 90px rgba(57,255,110,0.07);
      text-shadow: 0 0 12px rgba(57,255,110,0.7);
    }
    #enter-btn:hover::before { left: 160%; }
    #enter-btn:active { transform: scale(0.97); transition-duration: 0.08s; }

    /* ── Feedback ── */
    #feedback {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 5px;
      text-transform: uppercase;
      min-height: 18px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    #feedback.visible { opacity: 1; transform: translateY(0); }

    /* ── GRANTED ── */
    .state-granted #password {
      border-color: var(--green);
      color: var(--green);
      caret-color: var(--green);
      box-shadow: 0 0 0 4px rgba(57,255,110,0.08), 0 0 20px rgba(57,255,110,0.2);
    }
    .state-granted #enter-btn {
      border-color: var(--green);
      background: rgba(57,255,110,0.1);
      color: var(--green);
      animation: grantedPulse 1.8s ease-in-out infinite;
    }
    @keyframes grantedPulse {
      0%,100% { box-shadow: 0 0 18px var(--green-glow); }
      50%      { box-shadow: 0 0 44px rgba(57,255,110,0.75), 0 0 80px rgba(57,255,110,0.2); }
    }
    .state-granted #feedback   { color: var(--green); text-shadow: 0 0 10px rgba(57,255,110,0.5); }
    .state-granted .status-dot { animation: none; opacity: 1; box-shadow: 0 0 10px var(--green), 0 0 28px rgba(57,255,110,0.6); }

    /* ── DENIED ── */
    .state-denied #password {
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 0 4px rgba(255,64,96,0.08), 0 0 20px rgba(255,64,96,0.18);
    }
    .state-denied #enter-btn {
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 22px rgba(255,64,96,0.4), 0 0 50px rgba(255,64,96,0.12);
    }
    .state-denied #feedback   { color: var(--red); text-shadow: 0 0 10px rgba(255,64,96,0.5); }
    .state-denied .status-dot { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; opacity: 1; }

    /* ── Shake ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      12%  { transform: translateX(-10px) rotate(-1deg); }
      24%  { transform: translateX(10px)  rotate(1deg); }
      36%  { transform: translateX(-7px); }
      48%  { transform: translateX(7px); }
      60%  { transform: translateX(-4px); }
      72%  { transform: translateX(4px); }
      86%  { transform: translateX(-2px); }
    }
    .shake { animation: shake 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both !important; }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="assets/bg.mp4" type="video/mp4" />
  </video>

  <div class="overlay"></div>

  <audio id="bg-music" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
  </audio>

  <div class="gate" id="hud-panel">
    <label class="field-label" for="password">Access Code</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter Password" autocomplete="off" />
    </div>
    <div class="status-row">
      <div class="status-dot"></div>
      <span class="status-text" id="status-text">Awaiting Input</span>
    </div>
    <button id="enter-btn" onclick="enterSite()">Enter</button>
    <div id="feedback"></div>
  </div>

  <script>
    /* Music on first gesture */
    const music = document.getElementById('bg-music');
    let musicStarted = false;
    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      music.play().catch(() => {});
    }
    ['click','touchstart','keydown','pointerdown'].forEach(e =>
      document.addEventListener(e, startMusic, { passive: true })
    );

    /* Password gate */
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') enterSite();
    });

    let resetTimer = null;

    function enterSite() {
      const pw    = document.getElementById('password').value;
      const panel = document.getElementById('hud-panel');
      const fb    = document.getElementById('feedback');
      const btn   = document.getElementById('enter-btn');
      const st    = document.getElementById('status-text');

      clearTimeout(resetTimer);
      panel.classList.remove('state-granted', 'state-denied');
      fb.classList.remove('visible');
      btn.classList.remove('shake');
      void btn.offsetWidth;

      if (pw === 'baat8') {
        panel.classList.add('state-granted');
        fb.textContent = '✦  Access Granted  ✦';
        st.textContent = 'Identity Confirmed';
        requestAnimationFrame(() => fb.classList.add('visible'));
        setTimeout(() => { window.location.href = 'home.html'; }, 1500);
      } else {
        panel.classList.add('state-denied');
        btn.classList.add('shake');
        fb.textContent = '✕  Access Denied  ✕';
        st.textContent = 'Invalid Credentials';
        requestAnimationFrame(() => fb.classList.add('visible'));
        resetTimer = setTimeout(() => {
          panel.classList.remove('state-denied');
          fb.classList.remove('visible');
          btn.classList.remove('shake');
          st.textContent = 'Awaiting Input';
          document.getElementById('password').value = '';
        }, 3000);
      }
    }
  </script>
</body>
</html>
